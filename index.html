<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奥特曼打怪兽</title>
  <!-- 小朋友友好：大图少字，选 3 打 3 -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/select-ui.css?v=difficulty-popup-1" />
  <link rel="stylesheet" href="css/battle-ui.css" />
  <link rel="stylesheet" href="css/arcade-fx.css?v=skill-fx-18" />
  <link rel="stylesheet" href="css/layout-fit.css?v=difficulty-popup-1" />
  <link rel="stylesheet" href="css/kids-ui.css" />
  <link rel="stylesheet" href="css/battle-overlay-fix.css" />
  <link rel="stylesheet" href="css/fullbody-fix.css" />
  <link rel="stylesheet" href="css/duel-table.css?v=random-arenas-15" />
  <link rel="stylesheet" href="css/status-avatar-fx.css?v=purple-bubbles-2" />
  <link rel="stylesheet" href="css/turn-order.css?v=1" />
  <link rel="stylesheet" href="css/math-challenge.css?v=tip-half-voice-2" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">⚡</span>
        <div>
          <h1>奥特曼打怪兽</h1>
          <p>选 3 个奥特曼，打赢怪兽！</p>
        </div>
      </div>
      <div id="phase-badge" class="phase-badge">选人</div>
    </header>

    <main id="screen-select" class="screen active">
      <section class="panel select-main-panel">
        <!-- 标题 + 进度 + 操作：合并成一行，腾出纵向空间 -->
        <div class="panel-head select-hero-head select-toolbar select-merged-bar">
          <div class="select-hero-copy">
            <h2>点下面小图选奥特曼</h2>
            <p id="select-status-text" class="select-status-text">先点下面小图选 3 个奥特曼</p>
          </div>
          <div class="select-merged-right">
            <div class="select-progress" aria-live="polite">
              <div class="select-progress-meta">
                <span class="select-progress-label">已选</span>
                <span class="select-progress-count"><span id="select-count">0</span><span class="select-progress-total">/3</span></span>
              </div>
              <div class="select-progress-track" aria-hidden="true">
                <span id="select-progress-fill" class="select-progress-fill" style="width: 0%"></span>
              </div>
            </div>
            <div class="panel-actions select-actions">
              <button id="btn-random" class="btn ghost accent" type="button">🎲 随机</button>
              <button id="btn-clear" class="btn ghost" type="button">清空</button>
              <button id="btn-start" class="btn primary" type="button" disabled>开战！</button>
            </div>
          </div>
        </div>

        <div class="difficulty-picker difficulty-picker--compact" aria-label="战斗难度">
          <div class="difficulty-picker-head">
            <span class="difficulty-picker-label">难度</span>
            <span id="difficulty-desc" class="difficulty-picker-desc">直接出手，和现在一样</span>
          </div>
          <div id="difficulty-options" class="difficulty-options" role="radiogroup" aria-label="选择难度">
            <button type="button" class="difficulty-option is-active" data-difficulty="easy" aria-pressed="true">初级</button>
            <button type="button" class="difficulty-option" data-difficulty="normal" aria-pressed="false">中级</button>
            <button type="button" class="difficulty-option" data-difficulty="hard" aria-pressed="false">高级</button>
            <button type="button" class="difficulty-option" data-difficulty="hell" aria-pressed="false">地狱级</button>
          </div>
        </div>

        <!-- 上：3 个已选大图框 -->
        <div id="selected-slots" class="selected-slots" aria-label="已选奥特曼大图">
          <div class="selected-slot empty" data-slot="0">
            <div class="selected-slot-order">1</div>
            <div class="selected-slot-body">
              <div class="selected-slot-empty">空位</div>
            </div>
          </div>
          <div class="selected-slot empty" data-slot="1">
            <div class="selected-slot-order">2</div>
            <div class="selected-slot-body">
              <div class="selected-slot-empty">空位</div>
            </div>
          </div>
          <div class="selected-slot empty" data-slot="2">
            <div class="selected-slot-order">3</div>
            <div class="selected-slot-body">
              <div class="selected-slot-empty">空位</div>
            </div>
          </div>
        </div>

        <!-- 下：全角色缩略图 -->
        <div class="select-thumb-section">
          <div class="select-thumb-label">全部奥特曼</div>
          <div id="hero-grid" class="card-grid select-card-grid select-thumb-grid"></div>
        </div>

        <!-- 兼容旧逻辑：隐藏侧栏列表节点，供 JS 同步写入 -->
        <div id="selected-list" class="selected-list empty" hidden>还没选人</div>
      </section>
    </main>

    <main id="screen-battle" class="screen">
      <section class="battle-field four-columns">
        <!-- 1. 奥特曼（左） -->
        <div class="team-column ally battle-row">
          <div class="team-title">
            <span>奥特曼</span>
            <span class="team-sub">我方</span>
          </div>
          <div id="ally-team" class="team-row"></div>
          <section class="action-bar battle-row" aria-label="战斗操作">
            <div class="action-meta">
              <div id="actor-info" class="actor-info">准备出手</div>
              <div class="action-tools">
                <div id="target-hint" class="target-hint"></div>
                <button id="btn-auto-battle" class="btn ghost auto-toggle" type="button" aria-pressed="false">
                  <span class="auto-dot" aria-hidden="true"></span>
                  <span id="auto-battle-label">自动：关</span>
                </button>
              </div>
            </div>
            <div id="skill-buttons" class="skill-buttons"></div>
            <button id="btn-cancel-target" class="btn ghost" type="button" hidden>取消</button>
          </section>
        </div>

        <!-- 2. 当前人物与战斗舞台（中左） -->
        <div class="battle-center battle-row">
          <div id="turn-banner" class="turn-banner">准备开战</div>
          <div class="battle-center-main">
            <div id="current-actor" class="current-actor" aria-live="polite">
              <div class="current-actor-empty">等待出手</div>
            </div>
            <div class="battle-info-panel">
              <div id="battle-stage" class="battle-stage" aria-hidden="true">
                <div class="stage-glow stage-glow-left"></div>
                <div class="stage-glow stage-glow-right"></div>
                <div class="stage-beam"></div>
                <div class="stage-floor"></div>
              </div>
              <!-- 兼容旧节点，默认隐藏 -->
              <section id="monster-intel" class="monster-intel" hidden aria-hidden="true">
                <div class="monster-intel-head">
                  <h3>怪兽情报</h3>
                </div>
                <div id="monster-intel-list" class="monster-intel-list"></div>
              </section>
            </div>
          </div>
        </div>

        <!-- 3. 怪兽（中右） -->
        <div class="team-column enemy battle-row">
          <div class="team-title">
            <span>怪兽</span>
            <span class="team-sub">敌方</span>
          </div>
          <div id="enemy-team" class="team-row"></div>
          <div class="battle-log-wrap battle-row" aria-label="战斗信息">
            <div class="battle-log-label">战斗信息</div>
            <div id="battle-log" class="battle-log" aria-live="polite"></div>
          </div>
        </div>

      </section>
    </main>

    <div id="result-modal" class="modal" hidden>
      <div class="modal-card">
        <div class="result-radiance" aria-hidden="true"></div>
        <div class="result-sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
        <div id="result-icon" class="result-icon" aria-hidden="true">★</div>
        <h2 id="result-title">胜利！</h2>
        <p id="result-desc">奥特曼赢了！</p>
        <div class="modal-actions">
          <button id="btn-restart" class="btn primary" type="button">再来一局</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 心算挑战弹窗（中级及以上） -->
  <div id="math-challenge-root" class="math-challenge-root" hidden aria-hidden="true">
    <div class="math-challenge-backdrop" data-math-dismiss="0"></div>
    <div class="math-challenge-card" role="dialog" aria-modal="true" aria-labelledby="math-challenge-title">
      <div class="math-challenge-head">
        <div>
          <div id="math-challenge-title" class="math-challenge-title">心算挑战</div>
          <div id="math-challenge-sub" class="math-challenge-sub">答对技能更强</div>
        </div>
        <div class="math-challenge-timer-wrap" aria-live="polite">
          <div class="math-challenge-timer-label">剩余</div>
          <div id="math-challenge-timer" class="math-challenge-timer">30</div>
        </div>
      </div>
      <div class="math-challenge-body">
        <div id="math-challenge-question" class="math-question" aria-live="polite">1 + 1 = ?</div>
        <div class="math-tip-panel" id="math-challenge-tip-panel" hidden>
          <div class="math-tip-head">
            <span class="math-tip-badge">提醒</span>
            <strong id="math-challenge-tip-title">小提示</strong>
          </div>
          <div class="math-tip-steps" id="math-challenge-tip-steps"></div>
        </div>
        <form id="math-challenge-form" class="math-form" autocomplete="off">
          <label class="math-input-label" for="math-challenge-input">答案</label>
          <input id="math-challenge-input" class="math-input" type="number" inputmode="numeric" enterkeyhint="done" required />
          <div class="math-form-actions">
            <button id="math-challenge-tip-btn" class="btn math-tip-btn" type="button" aria-expanded="false" aria-controls="math-challenge-tip-panel">提醒</button>
            <button id="math-challenge-submit" class="btn primary" type="submit">确定</button>
          </div>
        </form>
        <div id="math-challenge-hint" class="math-hint">不会就猜一个，快点！</div>
      </div>
    </div>
  </div>

  <!-- 开战前难度确认弹窗 -->
  <div id="difficulty-modal" class="difficulty-modal" hidden aria-hidden="true">
    <div class="difficulty-modal-backdrop" data-difficulty-dismiss="1"></div>
    <div class="difficulty-modal-card" role="dialog" aria-modal="true" aria-labelledby="difficulty-modal-title">
      <div class="difficulty-modal-head">
        <h2 id="difficulty-modal-title">选择难度</h2>
        <p class="difficulty-modal-lead">开战前再确认一次</p>
      </div>
      <div class="difficulty-modal-body">
        <div id="difficulty-modal-options" class="difficulty-options difficulty-modal-options" role="radiogroup" aria-label="开战难度">
          <button type="button" class="difficulty-option is-active" data-difficulty="easy" aria-pressed="true">初级</button>
          <button type="button" class="difficulty-option" data-difficulty="normal" aria-pressed="false">中级</button>
          <button type="button" class="difficulty-option" data-difficulty="hard" aria-pressed="false">高级</button>
          <button type="button" class="difficulty-option" data-difficulty="hell" aria-pressed="false">地狱级</button>
        </div>
        <p id="difficulty-modal-hint" class="difficulty-modal-hint">直接出手，和现在一样</p>
        <button id="btn-difficulty-confirm" class="btn primary difficulty-modal-confirm" type="button">确认难度</button>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=roster-25-12"></script>
  <script src="js/math-challenge.js?v=math-tip-voice-cute-1"></script>
  <script src="js/battle.js?v=difficulty-popup-1"></script>
  <script src="js/tip-half-and-voice.js?v=tip-half-voice-2"></script>
  <script src="js/fx.js?v=difficulty-popup-1"></script>
  <script src="js/ui.js?v=difficulty-popup-1"></script>
  <script src="js/main.js?v=difficulty-popup-1"></script>
</body>
</html>
