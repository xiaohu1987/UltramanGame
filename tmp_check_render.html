<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>avatar render check</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/select-ui.css" />
  <link rel="stylesheet" href="css/battle-ui.css" />
  <link rel="stylesheet" href="css/arcade-fx.css" />
  <link rel="stylesheet" href="css/layout-fit.css" />
  <link rel="stylesheet" href="css/kids-ui.css" />
  <link rel="stylesheet" href="css/battle-overlay-fix.css" />
  <link rel="stylesheet" href="css/fullbody-fix.css" />
  <style>
    body { margin: 0; background: #07111f; color: #fff; font-family: sans-serif; }
    .wrap { display: grid; grid-template-columns: 280px 280px; gap: 16px; padding: 20px; }
    .team-row {
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 8px;
      height: 720px;
    }
    pre { white-space: pre-wrap; background: #111; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="team-row" id="ally"></div>
    <div class="team-row" id="enemy"></div>
  </div>
  <pre id="out"></pre>
  <script>
    const heroes = [
      ["盖亚", "assets/ultraman_heroes/ULTRAMAN GAIA.jpg", "#26c6da"],
      ["初代", "assets/ultraman_heroes/ULTRAMAN.jpg", "#e53935"],
      ["迪迦", "assets/ultraman_heroes/ULTRAMAN TIGA.png", "#4fc3f7"],
    ];
    const monsters = [
      ["贝姆斯塔", "assets/ultraman_kaiju/BEMSTAR.png", "#00897b"],
      ["双尾怪", "assets/ultraman_kaiju/TWINTAIL.png", "#8d6e63"],
      ["杰顿", "assets/ultraman_kaiju/ZETTON (1).jpg", "#d32f2f"],
    ];
    function card(name, src, color, side) {
      return `
        <article class="fighter-card ${side}" style="--accent:${color}">
          <div class="fighter-layout">
            <div class="avatar-frame">
              <img src="${encodeURI(src)}" alt="${name}" class="avatar" />
              <div class="fighter-name-chip">${name}</div>
            </div>
            <div class="fighter-hp-block">
              <div class="hp-bar"><div class="hp-fill" style="width:100%"></div></div>
              <div class="hp-text">❤️ 100/100</div>
            </div>
          </div>
        </article>`;
    }
    document.getElementById("ally").innerHTML = heroes.map(([n,s,c]) => card(n,s,c,"hero")).join("");
    document.getElementById("enemy").innerHTML = monsters.map(([n,s,c]) => card(n,s,c,"enemy")).join("");
    window.addEventListener("load", () => {
      const img = document.querySelector("#ally .avatar");
      const frame = document.querySelector("#ally .avatar-frame");
      const cs = getComputedStyle(img);
      const fs = getComputedStyle(frame);
      const out = {
        img: {
          w: cs.width, h: cs.height, fit: cs.objectFit, pos: cs.objectPosition,
          maxW: cs.maxWidth, maxH: cs.maxHeight, padding: cs.padding,
          nw: img.naturalWidth, nh: img.naturalHeight,
          cw: img.clientWidth, ch: img.clientHeight,
        },
        frame: { w: fs.width, h: fs.height, overflow: fs.overflow, display: fs.display },
      };
      document.getElementById("out").textContent = JSON.stringify(out, null, 2);
    });
  </script>
</body>
</html>
